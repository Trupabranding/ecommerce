name: Static Analysis (PHPStan)

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
      - 'phpstan.neon'
      - 'phpstan-baseline.neon'
      - 'composer.lock'
  pull_request:
    paths:
      - '**.php'
      - 'phpstan.neon'
      - 'phpstan-baseline.neon'
      - 'composer.lock'

jobs:
  analyse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v3
        with:
          require-lock-file: true

      - name: Run phpstan
        run: composer analyse-ci -- --error-format=github
