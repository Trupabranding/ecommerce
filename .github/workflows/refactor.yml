name: Refactor (Rector)

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
      - 'rector-ci.php'
      - 'composer.lock'
  pull_request:
    paths:
      - '**.php'
      - 'rector-ci.php'
      - 'composer.lock'

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v3
        with:
          require-lock-file: true

      - name: Rector Cache
        uses: actions/cache@v5
        with:
          path: /tmp/rector
          key: ${{ runner.os }}-rector-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-rector-

      - run: mkdir -p /tmp/rector

      - name: Run rector
        run: composer refactor-ci -- --config=rector-ci.php
